services:
  # Mock External API - High Performance Spring Boot API
  # ⚠️ RECOMENDADO: Rode localmente para evitar problemas de Docker/proxy!
  # Windows: cd mock-api && .\run-local.bat
  # Linux/Mac: cd mock-api && ./run-local.sh
  #
  # Se realmente precisar usar Docker, descomente abaixo:
  mock-api:
    build:
      context: ./mock-api
      dockerfile: Dockerfile
    container_name: mock-external-api
    ports:
      - "8089:8089"
    environment:
      - JAVA_OPTS=-Xms512m -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    networks:
      - monitoring-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8089/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # WireMock (comentado - usando mock-api ao invés)
  # wiremock:
  #   image: wiremock/wiremock:3.3.1
  #   container_name: wiremock
  #   ports:
  #     - "8089:8080"
  #   volumes:
  #     - ./wiremock/mappings:/home/wiremock/mappings
  #     - ./wiremock/__files:/home/wiremock/__files
  #   command: ["--global-response-templating", "--verbose", "--container-threads", "200"]
  #   networks:
  #     - monitoring-network
  #   restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring-network
    depends_on:
      - mock-api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - monitoring-network
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  monitoring-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:

