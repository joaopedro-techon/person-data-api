# Server
server.port=8080

# External API URL (WireMock em Docker)
external.person-api.url=http://localhost:8089

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics,threaddump
management.endpoint.prometheus.enabled=true
management.metrics.enable.tomcat=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=person-api

# Prometheus metrics
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.sla.http.server.requests=100ms,200ms,500ms,1s,2s

# Configurar histogramas para métricas customizadas
management.metrics.distribution.percentiles-histogram.person.endpoint.response.time=true
management.metrics.distribution.sla.person.endpoint.response.time=50ms,100ms,200ms,500ms,1s,2s,5s
management.metrics.distribution.percentiles.person.endpoint.response.time=0.5,0.75,0.95,0.99,0.999

# Feign HttpClient Configuration (otimizado para throughput)
feign.httpclient.enabled=true
feign.httpclient.max-connections=200
feign.httpclient.max-connections-per-route=200
feign.httpclient.connection-timeout=5000
feign.httpclient.connection-request-timeout=1000
feign.httpclient.socket-timeout=10000
feign.httpclient.time-to-live=30000


# Metricas do Pool de Conexoes HTTP (Feign)
management.metrics.distribution.percentiles-histogram.feign.httpclient.pool.utilization.percent=true
management.metrics.distribution.sla.feign.httpclient.pool.utilization.percent=50,70,80,90,95,99
management.metrics.distribution.percentiles.feign.httpclient.pool.utilization.percent=0.5,0.75,0.95,0.99

