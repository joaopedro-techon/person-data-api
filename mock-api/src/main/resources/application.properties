# Server Configuration - High Performance
server.port=8089

# Tomcat Thread Pool - Otimizado para alta concorrência
# Máximo de threads para processar requisições
server.tomcat.threads.max=1000
# Mínimo de threads idle
server.tomcat.threads.min-spare=100
# Máximo de conexões simultâneas
server.tomcat.max-connections=10000
# Tamanho da fila de requisições pendentes
server.tomcat.accept-count=2000
# Timeout de conexão
server.tomcat.connection-timeout=20000

# Compressão HTTP para reduzir tamanho das respostas
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.com.example.mockapi=INFO
logging.level.org.springframework.web=WARN
logging.level.org.apache.tomcat=WARN

